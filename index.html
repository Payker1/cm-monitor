<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#f5f6f8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="방치형 돈복사">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
<link rel="manifest" href="manifest.json">
<title>방치형 돈복사</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Sora:wght@400;600;700;800&display=swap');
  :root{
    --bg:#0b1416;--bg-2:#101d20;--panel:#122225;--panel-2:#173034;
    --line:#22413f;--line-soft:#1b3331;--txt:#f4f6f8;--txt-dim:#a8b0b4;--txt-faint:#6c7679;
    --green:#1fd17a;--green-bg:rgba(31,209,122,.13);--red:#ff4d5e;--red-bg:rgba(255,77,94,.13);
    --amber:#ffb020;--amber-bg:rgba(255,176,32,.13);--blue:#3d8bff;--blue-bg:rgba(61,139,255,.13);
    --purple:#b08aff;--purple-bg:rgba(176,138,255,.14);--accent:#1fd17a;
    --bar-bg:rgba(11,20,22,1);--num:#ffffff;
    --glow1:rgba(31,209,122,0.08);--glow2:rgba(61,139,255,0.05);
  }
  body.light{
    --bg:#f5f6f8;--bg-2:#eceef1;--panel:#ffffff;--panel-2:#f3f4f6;
    --line:#e2e5ea;--line-soft:#eceef1;--txt:#1a1d21;--txt-dim:#5f6671;--txt-faint:#9aa0aa;
    --green:#12925a;--green-bg:rgba(18,146,90,.10);--red:#d12b3a;--red-bg:rgba(209,43,58,.10);
    --amber:#b3760e;--amber-bg:rgba(179,118,14,.12);--blue:#2563c9;--blue-bg:rgba(37,99,201,.10);
    --purple:#7a4fc0;--purple-bg:rgba(122,79,192,.11);--accent:#12925a;
    --bar-bg:rgba(255,255,255,1);--num:#0f1115;
    --glow1:rgba(18,146,90,0.05);--glow2:rgba(37,99,201,0.04);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html{background:var(--bg)!important;}
  html,body{background:var(--bg);color:var(--txt);font-family:'Sora',sans-serif;overscroll-behavior:none;
    transition:background .35s ease,color .35s ease;}
  body::before{content:'';position:fixed;inset:0;z-index:-1;background:
      radial-gradient(900px 500px at 80% -10%, var(--glow1), transparent 60%),
      radial-gradient(700px 400px at -10% 10%, var(--glow2), transparent 55%),
      var(--bg);}
  body{max-width:480px;margin:0 auto;padding-bottom:94px;min-height:100vh;
    background:radial-gradient(900px 500px at 80% -10%, var(--glow1), transparent 60%),
      radial-gradient(700px 400px at -10% 10%, var(--glow2), transparent 55%),var(--bg);}
  body::after{content:'';position:fixed;top:0;left:50%;transform:translate3d(-50%,0,0);width:100%;max-width:480px;height:env(safe-area-inset-top);background:#0b1416;z-index:60;pointer-events:none;will-change:transform;}
  body.light::after{background:#f5f6f8;}
  .topbar{position:sticky;top:0;z-index:40;backdrop-filter:blur(14px);
    background:var(--bar-bg);border-bottom:1px solid var(--line);padding:calc(11px + env(safe-area-inset-top)) 16px 10px;}
  .topbar::before{content:'';position:absolute;top:0;left:0;right:0;
    height:env(safe-area-inset-top);background:var(--bg);pointer-events:none;}
  .toprow{display:flex;align-items:center;gap:12px;}
  .themebtn{background:var(--panel-2);border:1px solid var(--line);border-radius:999px;
    width:32px;height:32px;display:grid;place-items:center;cursor:pointer;color:var(--txt-dim);
    flex:none;transition:all .2s;}
  .themebtn:active{transform:scale(.92);}
  .themebtn svg{width:17px;height:17px;}
  .themebtn .ic-sun{display:block;}
  .themebtn .ic-moon{display:none;}
  body.light .themebtn .ic-sun{display:none;}
  body.light .themebtn .ic-moon{display:block;}
  .brand{font-family:'JetBrains Mono';font-weight:800;font-size:15px;letter-spacing:.5px;}
  .brand b{color:var(--green);}
  .markets{margin-left:auto;display:flex;gap:8px;}
  .mkt{display:flex;align-items:center;gap:6px;font-family:'JetBrains Mono';
    font-size:11px;font-weight:700;letter-spacing:.5px;padding:5px 10px;border-radius:999px;
    border:1px solid var(--line);background:var(--panel-2);}
  .mkt .nm{color:var(--txt-dim);}
  .mkt.bull{border-color:rgba(52,210,127,.4);background:var(--green-bg);}
  .mkt.bull .st{color:var(--green);}
  .mkt.bear{border-color:rgba(255,90,104,.4);background:var(--red-bg);}
  .mkt.bear .st{color:var(--red);}
  .mkt .dot{width:6px;height:6px;border-radius:50%;}
  .mkt.bull .dot{background:var(--green);box-shadow:0 0 6px var(--green);}
  .mkt.bear .dot{background:var(--red);box-shadow:0 0 6px var(--red);}
  .page{display:none;padding:16px 14px 8px;animation:fade .35s ease;}
  .page.active{display:block;}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .sec-label{font-family:'JetBrains Mono';font-size:10px;font-weight:700;
    letter-spacing:1.5px;color:var(--txt-faint);text-transform:uppercase;margin:4px 2px 10px;}
  .hero{background:linear-gradient(160deg,var(--panel-2),var(--panel));
    border:1px solid var(--line);border-radius:18px;padding:18px 18px 14px;position:relative;overflow:hidden;}
  .hero::after{content:'';position:absolute;inset:0;
    background:radial-gradient(400px 160px at 90% 0%,rgba(31,209,122,.10),transparent 70%);pointer-events:none;}
  .hero .lbl{font-family:'JetBrains Mono';font-size:11px;color:var(--txt-dim);letter-spacing:.5px;}
  .hero .equity{font-family:'JetBrains Mono';font-weight:800;font-size:31px;margin-top:6px;letter-spacing:-1px;}
  .hero .chg{margin-top:6px;font-family:'JetBrains Mono';font-size:13px;font-weight:700;
    display:inline-flex;align-items:center;gap:6px;color:var(--green);}
  .hero .chg .pill{background:var(--green-bg);padding:2px 8px;border-radius:6px;}
  .spark{margin-top:14px;height:46px;width:100%;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px;}
  .stat{background:var(--panel);border:1px solid var(--line-soft);border-radius:14px;padding:13px 14px;}
  .stat .k{font-family:'JetBrains Mono';font-size:10px;color:var(--txt-faint);letter-spacing:.5px;text-transform:uppercase;}
  .stat .v{font-family:'JetBrains Mono';font-weight:800;font-size:21px;margin-top:5px;}
  .stat .sub{font-size:11px;color:var(--txt-dim);margin-top:2px;}
  .pos{background:var(--panel);border:1px solid var(--line-soft);border-radius:15px;
    padding:14px;margin-bottom:10px;position:relative;overflow:hidden;}
  .pos.danger{border-color:rgba(255,90,104,.45);}
  .pos .accent{position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--green);}
  .pos.loss .accent{background:var(--red);}
  .pos .hd{display:flex;justify-content:space-between;align-items:flex-start;}
  .pos .sym{font-family:'JetBrains Mono';font-weight:800;font-size:17px;letter-spacing:.5px;}
  .subnm{font-size:10px;color:var(--txt-faint);font-weight:500;margin-top:1px;}
  .symbox{display:flex;flex-direction:column;gap:1px;}
  .symwrap2{display:flex;flex-direction:column;gap:2px;}
  .symline{display:flex;align-items:center;gap:7px;}
  .pos .plwrap{text-align:right;}
  .pos .pl{font-family:'JetBrains Mono';font-weight:800;font-size:16px;}
  .pos .plamt{font-family:'JetBrains Mono';font-weight:600;font-size:12px;margin-top:2px;color:var(--txt-dim);}
  .pos .meta{display:flex;gap:14px;margin-top:9px;flex-wrap:wrap;}
  .pos .m{font-family:'JetBrains Mono';font-size:11px;color:var(--txt-dim);}
  .pos .m b{color:var(--txt);font-weight:600;}
  .stopline{margin-top:11px;background:var(--panel-2);border-radius:9px;padding:8px 11px;
    display:flex;justify-content:space-between;align-items:center;}
  .stopline .sl{font-family:'JetBrains Mono';font-size:11px;color:var(--txt-dim);}
  .stopline .sv{font-family:'JetBrains Mono';font-size:12px;font-weight:700;}
  .green{color:var(--green);}.red{color:var(--red);}.amber{color:var(--amber);}.purple{color:var(--purple);}
  .wgroup{margin-bottom:16px;}
  .wghead{display:flex;align-items:center;gap:8px;margin:2px 2px 9px;}
  .wghead .tag{font-family:'JetBrains Mono';font-size:11px;font-weight:700;letter-spacing:.5px;}
  .wghead .cnt{font-family:'JetBrains Mono';font-size:10px;color:var(--txt-faint);
    border:1px solid var(--line);border-radius:6px;padding:1px 7px;}
  .witem{background:var(--panel);border:1px solid var(--line-soft);border-radius:12px;
    padding:11px 13px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;}
  .witem .l{min-width:0;}
  .witem .l .symrow{display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
  .witem .l .sym{font-family:'JetBrains Mono';font-weight:700;font-size:15px;}
  .rs{font-family:'JetBrains Mono';font-size:9.5px;font-weight:700;letter-spacing:.3px;
    padding:2px 6px;border-radius:5px;border:1px solid;}
  .rs.hi{color:var(--green);border-color:rgba(31,209,122,.4);background:var(--green-bg);}
  .rs.mid{color:var(--amber);border-color:rgba(255,176,32,.4);background:var(--amber-bg);}
  .rs.lo{color:var(--txt-faint);border-color:var(--line);background:var(--panel-2);}
  .witem .l .pv{font-family:'JetBrains Mono';font-size:10px;color:var(--txt-faint);margin-top:3px;display:flex;white-space:nowrap;overflow:hidden;}
  .witem .l .pv .pvname{overflow:hidden;text-overflow:ellipsis;min-width:0;flex-shrink:1;}
  .witem .l .pv .pvfix{flex-shrink:0;}
  .witem .r{text-align:right;}
  .witem .r .px{font-family:'JetBrains Mono';font-weight:700;font-size:14px;}
  .witem .r .d{font-family:'JetBrains Mono';font-size:11px;margin-top:2px;}
  .sig{display:flex;gap:12px;padding:13px 4px;border-bottom:1px solid var(--line-soft);}
  .sig .ic{width:36px;height:36px;border-radius:9px;flex:none;display:grid;place-items:center;
    font-family:'JetBrains Mono';font-weight:800;font-size:11px;}
  .ic.buy{background:var(--green-bg);color:var(--green);}
  .ic.sell{background:var(--red-bg);color:var(--red);}
  .ic.stop{background:var(--amber-bg);color:var(--amber);}
  .ic.alert{background:var(--blue-bg);color:var(--blue);}
  .ic.watch{background:var(--purple-bg);color:var(--purple);}
  .sig .body{flex:1;min-width:0;}
  .sig .l1{display:flex;justify-content:space-between;align-items:baseline;}
  .sig .act{font-family:'JetBrains Mono';font-weight:700;font-size:13px;}
  .sig .t{font-family:'JetBrains Mono';font-size:10px;color:var(--txt-faint);}
  .sig .l2{font-size:12px;color:var(--txt-dim);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .sig .l2 b{font-family:'JetBrains Mono';color:var(--num);font-weight:700;}
  /* history */
  .filterrow{margin:2px 0 10px;}
  .seg{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap;}
  .chip{font-family:'JetBrains Mono';font-size:11px;font-weight:600;padding:6px 12px;
    border-radius:999px;border:1px solid var(--line);background:var(--panel);
    color:var(--txt-dim);cursor:pointer;transition:all .18s;}
  .chip.on{background:var(--green-bg);border-color:rgba(31,209,122,.45);color:var(--green);}
  .summary{background:linear-gradient(160deg,var(--panel-2),var(--panel));
    border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:14px;}
  .summary .biglbl{font-family:'JetBrains Mono';font-size:11px;color:var(--txt-dim);}
  .summary .big{font-family:'JetBrains Mono';font-weight:800;font-size:26px;letter-spacing:-.5px;margin-top:4px;}
  .summary .mini{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px;}
  .summary .mini .k{font-family:'JetBrains Mono';font-size:9px;color:var(--txt-faint);letter-spacing:.5px;text-transform:uppercase;}
  .summary .mini .v{font-family:'JetBrains Mono';font-weight:700;font-size:15px;margin-top:3px;}
  .trade{background:var(--panel);border:1px solid var(--line-soft);border-radius:12px;
    padding:12px 13px;margin-bottom:8px;position:relative;overflow:hidden;}
  .trade .accent{position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--green);}
  .trade.loss .accent{background:var(--red);}
  .trade .hd{display:flex;justify-content:space-between;align-items:flex-start;}
  .trade .symwrap{display:flex;align-items:center;gap:7px;}
  .trade .sym{font-family:'JetBrains Mono';font-weight:800;font-size:15px;}
  .trade .flag{font-family:'JetBrains Mono';font-size:9px;font-weight:700;padding:1px 5px;
    border-radius:4px;border:1px solid var(--line);color:var(--txt-faint);}
  .trade .pl{font-family:'JetBrains Mono';font-weight:800;font-size:15px;text-align:right;}
  .trade .plr{font-family:'JetBrains Mono';font-size:11px;margin-top:1px;color:var(--txt-dim);text-align:right;}
  .trade .meta{display:flex;gap:12px;margin-top:8px;flex-wrap:wrap;}
  .trade .m{font-family:'JetBrains Mono';font-size:10.5px;color:var(--txt-dim);}
  .trade .m b{color:var(--txt);font-weight:600;}
  /* market */
  .regcard{border-radius:16px;padding:15px 16px;margin-bottom:11px;border:1px solid var(--line);position:relative;overflow:hidden;cursor:pointer;transition:box-shadow .2s,transform .1s;}
  .regcard:active{transform:scale(.995);}
  .regcard.sel.bull{box-shadow:0 0 0 2px var(--green);}
  .regcard.sel.bear{box-shadow:0 0 0 2px var(--red);}
  .regcard.sel.side{box-shadow:0 0 0 2px var(--amber);}
  .regcard .pick{font-family:'JetBrains Mono';font-size:9px;font-weight:700;letter-spacing:.5px;
    padding:2px 7px;border-radius:5px;margin-left:8px;display:none;}
  .regcard.bull .pick{background:var(--green);color:#06231a;}
  .regcard.bear .pick{background:var(--red);color:#2a0307;}
  .regcard.side .pick{background:var(--amber);color:#2a1a00;}
  body.light .regcard.bull .pick{color:#ffffff;}
  body.light .regcard.bear .pick{color:#ffffff;}
  .regcard.sel .pick{display:inline-block;}
  .mtitle{display:flex;align-items:center;}
  .regcard.bull{background:linear-gradient(160deg,rgba(31,209,122,.10),var(--panel));border-color:rgba(31,209,122,.35);}
  .regcard.bear{background:linear-gradient(160deg,rgba(255,77,94,.10),var(--panel));border-color:rgba(255,77,94,.35);}
  .regcard .top{display:flex;align-items:center;justify-content:space-between;}
  .regcard .mname{font-family:'JetBrains Mono';font-weight:800;font-size:16px;letter-spacing:.5px;}
  .regcard .verdict{font-family:'JetBrains Mono';font-weight:800;font-size:14px;padding:4px 11px;border-radius:999px;}
  .regcard.bull .verdict{color:var(--green);background:var(--green-bg);}
  .regcard.bear .verdict{color:var(--red);background:var(--red-bg);}
  .regcard.side .verdict{color:var(--amber);background:var(--amber-bg);}
  .regcard.side{background:linear-gradient(160deg,rgba(255,176,32,.10),var(--panel));border-color:rgba(255,176,32,.4);}
  .regcard.side.sel{border-color:var(--amber);}
  .regcard.side .ddbar i.hit{background:var(--amber);}
  .mkt.side{border-color:rgba(255,176,32,.4);background:var(--amber-bg);}
  .mkt.side .st{color:var(--amber);}
  .mkt.side .dot{background:var(--amber);box-shadow:0 0 6px var(--amber);}
  .regcard.bull{border-color:rgba(31,209,122,.35);}
  .regcard.bear{border-color:rgba(255,90,90,.35);}
  .regcard.bull .ddbar i.hit{background:var(--green);}
  .regcard.bear .ddbar i.hit{background:var(--red);}
  .regcard .rows{margin-top:13px;display:flex;flex-direction:column;gap:9px;}
  .regrow{display:flex;align-items:center;justify-content:space-between;}
  .regrow .lbl{font-family:'JetBrains Mono';font-size:11px;color:var(--txt-dim);}
  .regrow .val{font-family:'JetBrains Mono';font-size:12px;font-weight:700;}
  .ddbar{display:flex;gap:3px;align-items:center;}
  .ddbar i{width:9px;height:9px;border-radius:2px;background:var(--line);display:inline-block;}
  .ddbar i.hit{background:var(--red);}
  .sector{display:flex;align-items:center;gap:11px;padding:10px 12px;background:var(--panel);
    border:1px solid var(--line-soft);border-radius:11px;margin-bottom:7px;}
  .sector .rank{font-family:'JetBrains Mono';font-weight:800;font-size:13px;color:var(--txt-faint);width:18px;}
  .sector .nm{font-family:'JetBrains Mono';font-weight:700;font-size:14px;flex:1;}
  .sector .rsbar{flex:1.4;height:7px;border-radius:5px;background:var(--line);overflow:hidden;max-width:120px;}
  .sector .rsbar div{height:100%;background:linear-gradient(90deg,var(--amber),var(--green));}
  .sector .pct{font-family:'JetBrains Mono';font-size:11px;font-weight:700;width:48px;text-align:right;}
  .lead{display:flex;align-items:center;gap:10px;padding:11px 12px;background:var(--panel);
    border:1px solid var(--line-soft);border-radius:11px;margin-bottom:7px;}
  .lead .l{flex:1;min-width:0;}
  .lead .sym{font-family:'JetBrains Mono';font-weight:800;font-size:14px;}
  .lead .sub{font-family:'JetBrains Mono';font-size:10px;color:var(--txt-faint);margin-top:3px;}
  .lead .r{text-align:right;}
  .lead .vol{font-family:'JetBrains Mono';font-size:12px;font-weight:700;}
  .lead .vollbl{font-family:'JetBrains Mono';font-size:9px;color:var(--txt-faint);margin-top:2px;}
  /* more button + sheet */
  .morebtn{width:100%;margin-top:4px;padding:11px;border-radius:11px;cursor:pointer;
    background:var(--panel);border:1px solid var(--line);color:var(--txt-dim);
    font-family:'JetBrains Mono';font-size:12px;font-weight:600;letter-spacing:.3px;transition:all .2s;}
  .morebtn:active{transform:scale(.99);}
  .sheet{position:fixed;inset:0;z-index:80;background:rgba(0,0,0,.5);backdrop-filter:blur(3px);
    display:none;opacity:0;transition:opacity .25s;}
  .sheet.open{display:block;opacity:1;}
  .sheet .panel{position:absolute;left:50%;transform:translateX(-50%) translateY(100%);
    bottom:0;width:100%;max-width:480px;height:86vh;background:var(--bg);
    border-top-left-radius:20px;border-top-right-radius:20px;border:1px solid var(--line);
    transition:transform .3s ease;display:flex;flex-direction:column;}
  .sheet.open .panel{transform:translateX(-50%) translateY(0);}
  .sheet .grip{width:38px;height:4px;border-radius:3px;background:var(--line);margin:10px auto 4px;}
  .sheet .shead{display:flex;align-items:center;padding:6px 16px 12px;border-bottom:1px solid var(--line-soft);}
  .sheet .shead .tt{font-family:'JetBrains Mono';font-weight:800;font-size:15px;}
  .sheet .shead .cls{margin-left:auto;background:var(--panel-2);border:1px solid var(--line);
    color:var(--txt-dim);width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:16px;line-height:1;}
  .subtabs{display:flex;gap:8px;padding:12px 16px;}
  .subtab{flex:1;padding:9px;border-radius:10px;cursor:pointer;text-align:center;
    background:var(--panel);border:1px solid var(--line);color:var(--txt-dim);
    font-family:'JetBrains Mono';font-size:12px;font-weight:700;transition:all .18s;}
  .subtab.on{background:var(--green-bg);border-color:rgba(31,209,122,.45);color:var(--green);}
  .ranklist{flex:1;overflow-y:auto;padding:0 16px 24px;}
  .rk{display:flex;align-items:center;gap:10px;padding:7px 4px;border-bottom:1px solid var(--line-soft);}
  .rk .no{font-family:'JetBrains Mono';font-weight:800;font-size:13px;color:var(--txt-faint);width:24px;text-align:center;}
  .rk .info{flex:1;min-width:0;}
  .rk .nm{font-family:'JetBrains Mono';font-weight:700;font-size:14px;}
  .rk .sub{font-family:'JetBrains Mono';font-size:10px;color:var(--txt-faint);margin-top:2px;}
  .rk .metric{font-family:'JetBrains Mono';font-weight:800;font-size:13px;text-align:right;}
  .rk .metric.rs{color:var(--green);border:none;background:none;padding:0;border-radius:0;}
  .ownb{font-family:'JetBrains Mono';font-size:9px;font-weight:700;padding:1px 5px;border-radius:5px;margin-left:4px;vertical-align:middle;}
  .ownb.hold{color:var(--green);background:var(--green-bg);}
  .ownb.watch{color:var(--amber);background:rgba(245,180,80,.16);}
  .cumret{font-family:'JetBrains Mono';font-size:12px;color:var(--txt-dim);margin-top:4px;}
  .possum{display:flex;justify-content:space-between;align-items:center;padding:13px 15px;margin-bottom:11px;background:var(--panel);border:1px solid var(--line);border-radius:13px;}
  .possum .ps-k{font-size:11px;color:var(--txt-dim);margin-bottom:3px;}
  .possum .ps-v{font-family:'JetBrains Mono';font-weight:800;font-size:17px;}
  .possum .ps-r{text-align:right;}
  .possum .ps-pct{font-family:'JetBrains Mono';font-weight:800;font-size:16px;}
  .possum .ps-amt{font-family:'JetBrains Mono';font-size:11px;margin-top:2px;}
  .newb{font-family:'JetBrains Mono';font-size:9px;font-weight:800;color:#fff;background:var(--blue,#3b82f6);padding:1px 5px;border-radius:5px;letter-spacing:.3px;}
  .nav{position:fixed;bottom:-6px;left:50%;transform:translateX(-50%);width:100%;max-width:480px;
    background:var(--bar-bg);backdrop-filter:blur(16px);border-top:1px solid var(--line);
    display:flex;padding:9px 6px calc(10px + env(safe-area-inset-bottom));z-index:50;}
  .nav button{flex:1;background:none;border:none;color:var(--txt-faint);
    display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 0;cursor:pointer;
    font-family:'JetBrains Mono';font-size:8px;font-weight:600;letter-spacing:0;transition:color .2s;}
  .nav button.active{color:var(--green);}
  .nav svg{width:19px;height:19px;}
  .nav button.active svg{filter:drop-shadow(0 0 6px rgba(31,209,122,.5));}
</style>
</head>
<body>
<script>if((localStorage.getItem('cm_theme')||'light')==='light')document.body.classList.add('light');</script>
<div class="topbar"><div class="toprow">
  <div class="brand">K<b>CopyMoney</b></div>
    <button id="themeToggle" class="themebtn" aria-label="테마 전환">
      <svg class="ic-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
      <svg class="ic-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
    </button>
  <div class="markets">
    <div class="mkt bull"><span class="dot"></span><span class="nm">KR</span><span class="st">강세</span></div>

</div></div>

<section class="page active" id="home">

  <div class="grid2" id="homeStats"></div>

</section>

<section class="page" id="positions">

  <div class="filterrow"><div class="seg" id="segPos"><button class="chip on" data-m="all">전체</button><button class="chip" data-m="KR">KR</button><button class="chip" data-m="US">US</button></div></div>
  <div id="posList"></div>
</section>

<section class="page" id="watch">
  <div class="filterrow"><div class="seg" id="segWat"><button class="chip on" data-m="all">전체</button><button class="chip" data-m="KR">KR</button><button class="chip" data-m="US">US</button></div></div>
  <div id="watchList"></div>
</section>

<section class="page" id="signals">
  <div class="sec-label">시그널 피드 · 실시간</div>
  <div class="filterrow"><div class="seg" id="segSig"><button class="chip on" data-m="all">전체</button><button class="chip" data-m="KR">KR</button><button class="chip" data-m="US">US</button></div></div>
  <div id="sigList"></div>
</section>

<section class="page" id="history">
  <div class="sec-label">매매 이력 · 청산 종목</div>
  <div class="filterrow">
    <div class="seg" id="segMarket">
      <button class="chip on" data-m="all">전체</button>
      <button class="chip" data-m="kr">KR</button>
      <button class="chip" data-m="us">US</button>
    </div>
    <div class="seg" id="segPeriod">
      <button class="chip on" data-p="1m">1개월</button>
      <button class="chip" data-p="3m">3개월</button>
      <button class="chip" data-p="ytd">YTD</button>
      <button class="chip" data-p="all">전체</button>
    </div>
  </div>
  <div class="summary">
    <div class="biglbl">기간 실현손익 <span id="sumScope" style="color:var(--txt-faint)">· 전체 · 1개월</span></div>
    <div class="big green" id="sumPL">—</div>
    <div class="mini">
      <div><div class="k">승률</div><div class="v green" id="sumWin">—</div></div>
      <div><div class="k">손익비</div><div class="v" id="sumRR">—</div></div>
      <div><div class="k">매매</div><div class="v" id="sumN">—</div></div>
    </div>
  </div>
  <div id="tradeList"></div>
</section>

<section class="page" id="market">
  <div class="sec-label">시장 국면 <span style="color:var(--txt-faint);text-transform:none;letter-spacing:0">· 탭하여 시장 선택</span></div>
  <div id="cardKR"></div>
  <div id="cardUS"></div>
  <div class="sec-label" style="margin-top:18px">오늘의 주도주 · <span id="mktLabelLead">국장</span> 거래대금 상위</div>
  <div id="leadList"></div>
  <button class="morebtn" id="moreBtn">전체 순위 더보기 · 거래대금 / RS 상위 50</button>
</section>


<!-- ════ RANKING SHEET ════ -->
<div class="sheet" id="rankSheet">
  <div class="panel">
    <div class="grip"></div>
    <div class="shead"><span class="tt" id="sheetTitle">전체 순위 · 국장</span>
      <button class="cls" id="sheetClose">×</button></div>
    <div class="subtabs">
      <div class="subtab on" id="tabVol" data-k="vol">거래대금 TOP 50</div>
      <div class="subtab" id="tabRs" data-k="rs">RS 점수 TOP 50</div>
    </div>

  </div>
</div>

<nav class="nav">
  <button class="active" data-t="home"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12l9-8 9 8M5 10v10h14V10"/></svg>홈</button>
  <button data-t="market"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21V3M3 8h6V5h6v6h6"/><path d="M3 16h9v-3h6"/></svg>마켓</button>
  <button data-t="positions"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 17l5-5 4 4 7-8M4 4v16h16"/></svg>보유</button>
  <button data-t="watch"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="2.5"/></svg>관심</button>
  <button data-t="signals"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L4 14h7l-1 8 9-12h-7l1-8z"/></svg>시그널</button>
  <button data-t="history"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M7 14l4-4 3 3 5-6"/></svg>이력</button>
</nav>
<script>
const STATE_URL='state.json', REFRESH_MS=15000;
let STATE=null, curM='all', curP='1m', curMarket='kr', sheetKey='vol', userPicked=false, posF='all', watF='all', sigF='all';

// ── 탭 네비 ──
const btns=document.querySelectorAll('.nav button'), pages=document.querySelectorAll('.page');
btns.forEach(b=>b.addEventListener('click',()=>{
  btns.forEach(x=>x.classList.remove('active'));
  pages.forEach(p=>p.classList.remove('active'));
  b.classList.add('active');
  document.getElementById(b.dataset.t).classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}));

// ── 테마 토글 ──
document.getElementById('themeToggle').addEventListener('click',()=>{
  document.body.classList.toggle('light');
  const dark=!document.body.classList.contains('light');
  document.querySelector('meta[name=theme-color]').setAttribute('content',dark?'#0b1416':'#f5f6f8');
  localStorage.setItem('cm_theme',dark?'dark':'light');
});

// ── 포맷 헬퍼 ──
const won=n=>'₩'+Math.round(n||0).toLocaleString('en-US');
let hideBal=localStorage.getItem('cm_hidebal')==='1';
const maskWon=n=>hideBal?'₩ ******':won(n);
const maskSignWon=n=>hideBal?'******':signWon(n);
const signWon=n=>(n>=0?'+':'−')+'₩'+Math.abs(Math.round(n||0)).toLocaleString('en-US');
const signPct=n=>(n>=0?'+':'−')+Math.abs(n||0).toFixed(2)+'%';
const px=(v,mkt)=>mkt==='US'?'$'+(+v||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}):Math.round(+v||0).toLocaleString('en-US');
const cls=n=>n>=0?'green':'red';
const rsCls=v=>v>=85?'hi':(v>=70?'mid':'lo');
const esc=s=>String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const emptyMsg=t=>`<div style="text-align:center;color:var(--txt-faint);font-family:'JetBrains Mono';font-size:12px;padding:30px 0">${t}</div>`;
const fmtVal=v=>typeof v==='number'?v.toLocaleString('en-US'):(v||'');
function fmtTV(v,mkt){ if(typeof v!=='number') return v||''; if(mkt==='kr') return Math.round(v/1e8).toLocaleString('en-US')+'억'; return (v/1e6).toLocaleString('en-US',{maximumFractionDigits:1})+'M$'; }
const fm=(arr,f)=>f==='all'?(arr||[]):(arr||[]).filter(x=>(x.market||'')===f);
function ownBadge(sym){ if((STATE.positions||[]).some(p=>p.sym===sym)) return ' <span class="ownb hold">보유</span>'; if((STATE.watchlist||[]).some(w=>w.sym===sym)) return ' <span class="ownb watch">관심</span>'; return ''; }
const mainNm=o=>o.market==='KR'?esc(o.name||o.sym):esc(o.sym);
const subNm=o=>o.market==='KR'?esc(o.sym):esc(o.name||'');

// ── 데이터 로드 ──
async function load(){
  try{
    const r=await fetch(STATE_URL+'?t='+Date.now(),{cache:'no-store',headers:{'Cache-Control':'no-cache','Pragma':'no-cache'}});
    if(!r.ok) throw new Error('HTTP '+r.status);
    STATE=await r.json(); renderAll(); checkNewSignals();
  }catch(e){
    console.error('state load failed',e);
    if(!STATE) document.getElementById('homeHero').innerHTML=
      '<div class="hero"><div class="lbl">데이터를 불러오지 못했습니다</div><div class="equity" style="font-size:17px">state.json 확인 필요</div></div>';
  }
}
function renderAll(){
  renderTopMarkets(); renderHome(); renderPositions(); renderWatch();
  renderSignals(); renderHistory(); renderMarketCards(); renderMarket(curMarket);
}

// ── 스파크라인 ──
function spark(series){
  if(!series||series.length<2) return '';
  const w=320,h=46,mn=Math.min(...series),mx=Math.max(...series),rng=(mx-mn)||1;
  const pts=series.map((v,i)=>((i/(series.length-1))*w).toFixed(0)+','+(h-4-((v-mn)/rng)*(h-8)).toFixed(1));
  const line='M'+pts.join(' L');
  return `<svg class="spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="rgba(31,209,122,.35)"/><stop offset="100%" stop-color="rgba(31,209,122,0)"/></linearGradient></defs>
    <path d="${line}" fill="none" stroke="var(--green)" stroke-width="2"/><path d="${line} L${w},${h} L0,${h} Z" fill="url(#g)"/></svg>`;
}

// ── 상단바 시장 배지 ──
function renderTopMarkets(){
  const m=STATE.markets||{};
  const badge=(nm,d)=>{const rg=d&&d.regime, cls=rg==='강세'?'bull':(rg==='횡보'?'side':'bear');
    return `<div class="mkt ${cls}"><span class="dot"></span><span class="nm">${nm}</span><span class="st">${d?(rg==='강세'?'강세':(rg==='횡보'?'횡보':'약세')):'—'}</span></div>`;};
  const el=document.querySelector('.markets'); if(el) el.innerHTML=badge('KR',m.kr)+badge('US',m.us);
}

// ── 홈 ──
function renderHome(){
  const a=STATE.account||{}, s=STATE.stats||{}, up=(a.day_change_krw||0)>=0;
  document.getElementById('homeHero').innerHTML=
    `<div class="hero"><div class="lbl">계좌 평가금액 <span id="eyeBtn" style="cursor:pointer;margin-left:4px;opacity:.65;font-size:13px">${hideBal?'🙈':'👁'}</span></div><div class="equity">${maskWon(a.equity_krw)}</div>
     <div class="chg" style="color:var(--${up?'green':'red'})"><span class="pill" style="background:var(--${up?'green':'red'}-bg)">${up?'▲':'▼'} ${maskSignWon(a.day_change_krw)}</span><span>${signPct(a.day_change_pct)} 오늘</span></div>
     ${spark(a.equity_series)}</div>`;
  document.getElementById('homeStats').innerHTML=
    `<div class="stat"><div class="k">오픈 포지션</div><div class="v">${s.open_positions||0}</div><div class="sub">종목 보유 중</div></div>
     <div class="stat"><div class="k">피벗 돌파</div><div class="v green">${(STATE.watchlist||[]).filter(w=>w.group==='breakout').length}</div><div class="sub">브레이크아웃 종목</div></div>
     <div class="stat"><div class="k">승률 (30일)</div><div class="v green">${Math.round(s.win_rate_30d||0)}%</div><div class="sub">${s.wins_30d||0}승 ${s.losses_30d||0}패</div></div>
     <div class="stat"><div class="k">평균 손익비</div><div class="v">${(s.avg_rr||0).toFixed(1)}R</div><div class="sub">평균 수익/손실</div></div>`;
  const sigs=(STATE.signals_recent||[]).slice(0,3);
  document.getElementById('homeSignals').innerHTML=sigs.length?sigs.map(sigRow).join(''):emptyMsg('시그널 없음');
  const eb=document.getElementById('eyeBtn'); if(eb) eb.onclick=()=>{hideBal=!hideBal;localStorage.setItem('cm_hidebal',hideBal?'1':'0');renderHome();};
}

// ── 시그널 행 ──
const SIG_META={buy:['buy','BUY','green','매수 체결'],sell:['sell','SEL','red','매도 체결'],add:['watch','ADD','purple','관심종목 추가'],bo:['watch','BO','blue','피벗 돌파'],stop:['stop','STP','amber','손절선 조정'],alert:['alert','ALT','blue','시장 국면']};
function sigRow(s){
  const m=SIG_META[s.type]||['alert','·','blue',s.type];
  const t=s.ts?`${s.ts.slice(5,7)}.${s.ts.slice(8,10)} ${s.ts.slice(11,16)}`:'';
  const nm=s.market==='KR'?esc(s.name||s.sym):esc(s.sym);
  const J=a=>a.filter(Boolean).join(' · ');
  // ALT(시장국면/스크리닝): 2줄 전용
  if(s.type==='alert'){
    return `<div class="sig"><div class="ic alert">ALT</div><div class="body">
      <div class="l1"><span class="act blue">${esc(s.market||'')}${s.market?' · ':''}시장 국면${s.regime?` · ${esc(s.regime)}`:''}</span><span class="t">${t}</span></div>
      <div class="l2">${esc(s.note||'')}</div></div></div>`;
  }
  let l2;
  if(s.type==='buy'){
    const amt=s.amount!=null?s.amount:((s.price&&s.qty)?s.price*s.qty:null);
    l2=J([
      s.size_pct!=null?`포지션 ${s.size_pct}%`:null,
      s.price!=null?`매수 <b>${s.price}</b>`:null,
      s.qty!=null?`수량 <b>${(+s.qty).toLocaleString('en-US')}</b>`:null,
      amt!=null?`<b>${Math.round(amt).toLocaleString('en-US')}원</b>`:null,
      s.vol_ratio!=null?`거래량 ×${(+s.vol_ratio).toFixed(2)}`:null
    ]);
  }else if(s.type==='sell'){
    l2=J([
      s.reason?esc(s.reason):esc(s.note||'매도'),
      s.pl_pct!=null?`수익률 <b>${signPct(s.pl_pct)}</b>`:null,
      s.pl_krw!=null?`<b>${signWon(s.pl_krw)}</b>`:null
    ]);
  }else if(s.type==='bo'){
    l2=J([
      s.pivot!=null?`피벗 <b>${s.pivot}</b>`:null,
      s.price!=null?`현재 <b>${s.price}</b>`:null,
      s.vol_ratio!=null?`거래량 ×${(+s.vol_ratio).toFixed(2)}`:null
    ]);
  }else{
    l2=`${esc(s.note||'')}${s.price!=null?` · <b>${s.price}</b>`:''}${s.stop!=null?` · 손절 <b>${s.stop}</b>`:''}`;
  }
  return `<div class="sig"><div class="ic ${m[0]}">${m[1]}</div><div class="body">
    <div class="l1"><span class="act ${m[2]}">${m[3]} · ${nm}</span><span class="t">${t}</span></div>
    <div class="l2">${l2}</div></div></div>`;
}

// ── 보유 ──
function renderPositions(){
  const ps=fm(STATE.positions,posF).slice().sort((a,b)=>(b.pl_pct||0)-(a.pl_pct||0));
  const sumEval=ps.reduce((s,p)=>s+(p.eval_amount||0),0);
  const sumPl=ps.reduce((s,p)=>s+(p.pl_krw||0),0);
  const sumCost=sumEval-sumPl, sumPct=sumCost>0?(sumPl/sumCost*100):0, sc=sumPl>=0?'green':'red';
  const sumHtml=ps.length?`<div class="possum"><div class="ps-l"><div class="ps-k">보유 ${ps.length}종목 · 총 평가금액</div><div class="ps-v">${maskWon(sumEval)}</div></div><div class="ps-r"><div class="ps-pct ${sc}">${signPct(sumPct)}</div><div class="ps-amt ${sc}">${maskSignWon(sumPl)}</div></div></div>`:'';
  document.getElementById('posList').innerHTML=ps.length?(sumHtml+ps.map(p=>{
    const loss=p.is_loss||(p.pl_pct||0)<0, c=loss?'red':'green', danger=(p.stop_dist_pct!=null&&Math.abs(p.stop_dist_pct)<2);
    return `<div class="pos ${loss?'loss':''} ${danger?'danger':''}"><div class="accent"></div>
      <div class="hd"><div class="symbox"><span class="sym">${mainNm(p)}</span>${subNm(p)?`<span class="subnm">${subNm(p)}</span>`:''}</div><div class="plwrap"><div class="pl ${c}">${signPct(p.pl_pct)}</div><div class="plamt ${c}">${signWon(p.pl_krw)}</div></div></div>
      <div class="meta"><span class="m">진입 <b>${px(p.entry,p.market)}</b></span><span class="m">현재 <b>${px(p.current,p.market)}</b></span><span class="m">보유 <b>${p.hold_days||0}일</b></span></div>
      ${(p.qty!=null||p.eval_amount!=null||p.rs!=null)?`<div class="meta">${p.qty!=null?`<span class="m">수량 <b>${(+p.qty).toLocaleString('en-US')}</b></span>`:''}${p.eval_amount!=null?`<span class="m">평가 <b>${Math.round(p.eval_amount).toLocaleString('en-US')}원</b></span>`:''}${p.rs!=null?`<span class="m">RS <b>${p.rs}</b></span>`:''}</div>`:''}
      <div class="stopline"><span class="sl">${esc(p.stop_basis||'손절')} ${px(p.stop,p.market)}</span><span class="sv ${danger?'red':c}">↓ stop까지 −${Math.abs(p.stop_dist_pct||0).toFixed(1)}%</span></div></div>`;
  }).join('')):emptyMsg('보유 종목 없음');
}

// ── 관심 ──
function renderWatch(){
  const ws=fm(STATE.watchlist,watF), groups=[['breakout','🔥 BREAKOUT','green'],['pivot_near','⚡ PIVOT 근접','amber'],['basing','⏳ BASING','']];
  if(!ws.length){document.getElementById('watchList').innerHTML=emptyMsg('관심종목 없음');return;}
  let html='';
  groups.forEach(([key,label,color])=>{
    let items=ws.filter(w=>w.group===key);
    if(key==='breakout'){ items=items.slice().sort((a,b)=>((b.vol_ratio??b.est_vol??0)-(a.vol_ratio??a.est_vol??0))); }
    else if(key==='pivot_near'){ items=items.slice().sort((a,b)=>{ const da=(a.pivot&&a.price)?Math.abs(a.price-a.pivot)/a.pivot:Infinity, db=(b.pivot&&b.price)?Math.abs(b.price-b.pivot)/b.pivot:Infinity; return da-db; }); }
    html+=`<div class="wgroup"><div class="wghead"><span class="tag ${color}" ${color?'':'style="color:var(--txt-dim)"'}>${label}</span><span class="cnt">${items.length}</span></div>`;
    html+=items.length?items.map(w=>{
      const up=(w.change_pct||0)>=0, dCls=key==='basing'?'':(up?'green':'amber'), dTxt=key==='basing'?'관찰':signPct(w.change_pct)+(up?' ▲':'');
      const isKR=w.market==='KR', main=isKR?esc(w.name||w.sym):esc(w.sym), sub='';
      const volTxt=(key==='breakout'&&w.vol_ratio!=null)?` · 추정거래량 ×${(+w.vol_ratio).toFixed(2)}`:((key==='breakout'&&w.est_vol!=null)?` · 추정 ${fmtTV(w.est_vol,isKR?'kr':'us')}`:(key==='breakout'?' · 돌파':''));
      const _pd=(w.pivot&&w.price)?((w.price-w.pivot)/w.pivot*100):null;
      const pdTxt=(_pd!=null&&(key==='breakout'||key==='pivot_near'))?` (${_pd>=0?'+':''}${_pd.toFixed(1)}%)`:'';
      return `<div class="witem"><div class="l"><div class="symrow"><div class="sym">${main}</div>${w.is_new?'<span class="newb">NEW</span>':''}${w.rs!=null?`<span class="rs ${rsCls(w.rs)}">RS ${w.rs}</span>`:''}</div>
        <div class="pv">${sub?`<span class="pvname">${sub}</span><span class="pvfix"> · ${w.pivot!=null?`피벗 ${px(w.pivot,w.market)}${pdTxt}`:''}${volTxt}</span>`:`<span class="pvfix">${w.pivot!=null?`피벗 ${px(w.pivot,w.market)}${pdTxt}`:''}${volTxt}</span>`}</div></div>
        <div class="r"><div class="px">${px(w.price,w.market)}</div><div class="d ${dCls}" ${key==='basing'?'style="color:var(--txt-faint)"':''}>${dTxt}</div></div></div>`;
    }).join(''):`<div class="witem" style="opacity:.45"><div class="l"><div class="pv">없음</div></div></div>`;
    html+='</div>';
  });
  document.getElementById('watchList').innerHTML=html;
}

// ── 시그널 피드 ──
function renderSignals(){
  const cutoff=Date.now()-7*86400000;
  const sigs=fm(STATE.signals_recent,sigF).filter(s=>{const t=s.ts?Date.parse(s.ts):0; return !t||t>=cutoff;});
  document.getElementById('sigList').innerHTML=sigs.length?sigs.map(sigRow).join(''):emptyMsg('최근 7일 시그널 없음');
}

// ── 이력 ──
function renderHistory(){ applyHist(); renderTrades(); }
function applyHist(){
  const agg=((STATE.history||{}).agg||{})[curM]||{}, d=agg[curP]||{pl_krw:0,win_rate:0,avg_rr:0,count:0};
  const pl=document.getElementById('sumPL'); pl.textContent=signWon(d.pl_krw); pl.className='big '+cls(d.pl_krw);
  document.getElementById('sumWin').textContent=Math.round(d.win_rate||0)+'%';
  document.getElementById('sumRR').textContent=(d.avg_rr||0).toFixed(1);
  document.getElementById('sumN').textContent=(d.count||0)+'건';
  document.getElementById('sumScope').textContent='· '+({all:'전체',kr:'KR',us:'US'}[curM])+' · '+({'1m':'1개월','3m':'3개월',ytd:'YTD',all:'전체'}[curP]);
}
function renderTrades(){
  let ts=((STATE.history||{}).trades)||[];
  if(curM!=='all') ts=ts.filter(t=>(t.market||'').toLowerCase()===curM);
  document.getElementById('tradeList').innerHTML=ts.length?ts.map(t=>{
    const loss=t.is_loss||(t.pl_pct||0)<0, c=loss?'red':'green';
    return `<div class="trade ${loss?'loss':''}"><div class="accent"></div>
      <div class="hd"><div class="symwrap2"><div class="symline"><span class="sym">${mainNm(t)}</span><span class="flag">${esc(t.market)}</span></div>${subNm(t)?`<span class="subnm">${subNm(t)}</span>`:''}</div>
        <div><div class="pl ${c}">${signPct(t.pl_pct)}</div><div class="plr ${c}">${signWon(t.pl_krw)} · ${(t.rr>=0?'+':'')}${(t.rr||0).toFixed(1)}R</div></div></div>
      <div class="meta"><span class="m">진입 <b>${px(t.entry,t.market)}</b></span><span class="m">청산 <b>${px(t.exit,t.market)}</b></span><span class="m">보유 <b>${t.hold_days||0}일</b></span><span class="m">${(t.exit_date||'').slice(5).replace('-','/')}</span></div></div>`;
  }).join(''):emptyMsg('해당 기간 매매 없음');
}
document.querySelectorAll('#segMarket .chip').forEach(c=>c.addEventListener('click',()=>{
  document.querySelectorAll('#segMarket .chip').forEach(x=>x.classList.remove('on')); c.classList.add('on');curM=c.dataset.m;applyHist();renderTrades();}));
function bindSeg(id,setF){ document.querySelectorAll('#'+id+' .chip').forEach(c=>c.addEventListener('click',()=>{ document.querySelectorAll('#'+id+' .chip').forEach(x=>x.classList.remove('on')); c.classList.add('on'); setF(c.dataset.m); })); }
bindSeg('segPos',f=>{posF=f;renderPositions();});
bindSeg('segWat',f=>{watF=f;renderWatch();});
bindSeg('segSig',f=>{sigF=f;renderSignals();});
document.querySelectorAll('#segPeriod .chip').forEach(c=>c.addEventListener('click',()=>{
  document.querySelectorAll('#segPeriod .chip').forEach(x=>x.classList.remove('on')); c.classList.add('on');curP=c.dataset.p;applyHist();}));

// ── 마켓 카드 ──
function regCard(id,flag,name,d){
  const mkt=id==='cardKR'?'kr':'us';
  if(!d) return `<div class="regcard" id="${id}" data-mkt="${mkt}"><div class="top"><span class="mname">${flag} ${name}</span></div><div class="rows"><div class="regrow"><span class="lbl">데이터 없음</span></div></div></div>`;
  const rg=d.regime, bull=rg==='강세', side=rg==='횡보', dd=Math.max(0,Math.min(6,d.dd_count||0));
  const ddbar=Array.from({length:6},(_,i)=>`<i class="${i<dd?'hit':''}"></i>`).join('');
  const idx=d.idx_vs_50ma_pct||0, idxUp=idx>=0, mc=bull?'green':(side?'amber':'red'), cardCls=bull?'bull':(side?'side':'bear');
  return `<div class="regcard ${cardCls}" id="${id}" data-mkt="${mkt}">
    <div class="top"><span class="mtitle"><span class="mname">${flag} ${name}</span><span class="pick">선택됨</span></span><span class="verdict">${bull?'강세 · 공격':(side?'횡보 · 주의':'약세 · 방어')}</span></div>
    <div class="rows">
      <div class="regrow"><span class="lbl">분산일 (DD, 25일)</span><span class="ddbar">${ddbar}</span></div>
      <div class="regrow"><span class="lbl">마지막 추격일 (FTD)</span><span class="val ${mc}">${d.ftd?(d.ftd.slice(5).replace('-','/')+' 확인'):'미발생 · 대기'}</span></div>
      <div class="regrow"><span class="lbl">지수 vs 50일선</span><span class="val ${mc}">${signPct(idx)} ${idxUp?'위 ▲':'아래 ▼'}</span></div>
    </div></div>`;
}
function renderMarketCards(){
  const m=STATE.markets||{};
  document.getElementById('cardKR').outerHTML=regCard('cardKR','🇰🇷','KOSPI',m.kr);
  document.getElementById('cardUS').outerHTML=regCard('cardUS','🇺🇸','S&amp;P 500',m.us);
  document.getElementById('cardKR').addEventListener('click',()=>{userPicked=true;renderMarket('kr');});
  document.getElementById('cardUS').addEventListener('click',()=>{userPicked=true;renderMarket('us');});
}

// ── 거래대금 리더 + 순위 시트 ──
function renderMarket(mkt){
  curMarket=mkt;
  const rk=(STATE.ranking||{})[mkt]||{}, leaders=(rk.by_value||[]).slice(0,4);
  document.getElementById('mktLabelLead').textContent=mkt==='kr'?'국장':'미장';
  const isKR=mkt==='kr';
  document.getElementById('leadList').innerHTML=leaders.length?leaders.map(l=>{
    const main=isKR?esc(l.name||l.sym):esc(l.sym), sub=isKR?esc(l.sym):esc(l.name||'');
    return `<div class="lead"><div class="l"><div class="sym">${main}${ownBadge(l.sym)} <span class="rs ${rsCls(l.rs)}" style="margin-left:4px">RS ${l.rs}</span></div><div class="sub">${sub}</div></div>
     <div class="r"><div class="vol">${fmtTV(l.value,mkt)}</div><div class="vollbl">거래대금</div></div></div>`;
  }).join(''):emptyMsg('데이터 없음');
  const ck=document.getElementById('cardKR'),cu=document.getElementById('cardUS');
  if(ck)ck.classList.toggle('sel',mkt==='kr'); if(cu)cu.classList.toggle('sel',mkt==='us');
  if(document.getElementById('rankSheet').classList.contains('open')) renderRank();
}
function autoMarket(){const now=new Date(),k=(now.getUTCHours()*60+now.getUTCMinutes()+540)%1440;return (k>=330&&k<930)?'kr':'us';}
function renderRank(){
  const rk=(STATE.ranking||{})[curMarket]||{}, arr=(sheetKey==='vol'?(rk.by_value||[]):(rk.by_rs||[])).slice(0,50);
  document.getElementById('sheetTitle').textContent='전체 순위 · '+(curMarket==='kr'?'국장':'미장');
  const isKR=curMarket==='kr';
  document.getElementById('rankList').innerHTML=arr.length?arr.map((r,i)=>{
    const main=isKR?esc(r.name||r.sym):esc(r.sym), sub=isKR?esc(r.sym):esc(r.name||'');
    return `<div class="rk"><span class="no">${i+1}</span><div class="info"><div class="nm">${main}${ownBadge(r.sym)}</div><div class="sub">${sub}</div></div>`+
    (sheetKey==='vol'?`<div class="metric">${fmtTV(r.value,curMarket)}<div class="sub" style="text-align:right">RS ${r.rs}</div></div>`
      :`<div class="metric rs">RS ${r.rs}<div class="sub" style="text-align:right">${fmtTV(r.value,curMarket)}</div></div>`)+`</div>`;
  }).join(''):emptyMsg('데이터 없음');
}
document.getElementById('moreBtn').addEventListener('click',()=>{renderRank();document.getElementById('rankSheet').classList.add('open');});
document.getElementById('sheetClose').addEventListener('click',()=>document.getElementById('rankSheet').classList.remove('open'));
document.getElementById('rankSheet').addEventListener('click',e=>{if(e.target.id==='rankSheet')e.currentTarget.classList.remove('open');});
document.getElementById('tabVol').addEventListener('click',()=>{sheetKey='vol';document.getElementById('tabVol').classList.add('on');document.getElementById('tabRs').classList.remove('on');renderRank();});
document.getElementById('tabRs').addEventListener('click',()=>{sheetKey='rs';document.getElementById('tabRs').classList.add('on');document.getElementById('tabVol').classList.remove('on');renderRank();});

// ── 시작 ──
curMarket=autoMarket();
setInterval(()=>{if(!userPicked){const m=autoMarket();if(m!==curMarket)renderMarket(m);}},60000);
// ── 알림 (앱 열려있을 때) ──
let lastSigTs=localStorage.getItem('cm_lastsig')||'';
function checkNewSignals(){
  const sigs=(STATE&&STATE.signals_recent)||[];
  if(!sigs.length) return;
  const newest=sigs[0].ts||'';
  if(lastSigTs && newest>lastSigTs && ('Notification' in window) && Notification.permission==='granted' && ['buy','sell'].includes(sigs[0].type)){
    const s=sigs[0], label=(SIG_META[s.type]||[,,,s.type])[3];
    try{ new Notification(`${label} · ${s.market==='KR'?(s.name||s.sym):s.sym}`,{tag:newest}); }catch(e){}
  }
  if(newest){ lastSigTs=newest; localStorage.setItem('cm_lastsig',newest); }
}
function askNotif(){ if(('Notification' in window) && Notification.permission==='default'){ Notification.requestPermission().catch(()=>{}); } }
document.body.addEventListener('click',askNotif,{once:true});

load();
setInterval(load,REFRESH_MS);
